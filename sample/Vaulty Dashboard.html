<body data-cc-id="cc-1" style="background: rgb(245, 241, 232); font-family: Inter; cursor: crosshair;">
<div id="root"></div>

<div id="tweaks-panel" class="on">
  <h4>Tweaks · Vaulty</h4>
  <div class="row">
    <span class="label">Theme</span>
    <div class="seg" id="theme-seg">
      <button data-v="light" class="active">Light</button>
      <button data-v="dark">Dark</button>
    </div>
  </div>
  <div class="row">
    <span class="label">Currency</span>
    <div class="seg" id="ccy-seg">
      <button data-v="KRW" class="active">KRW ₩</button>
      <button data-v="USD">USD $</button>
    </div>
  </div>
</div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "currency": "KRW"
  }/*EDITMODE-END*/;
  window.__tweaks = { ...TWEAK_DEFAULTS };
  window.__applyTweaks = () => {
    if (window.__rerender) window.__rerender();
    document.querySelectorAll('#theme-seg button').forEach(b => b.classList.toggle('active', b.dataset.v === window.__tweaks.theme));
    document.querySelectorAll('#ccy-seg button').forEach(b => b.classList.toggle('active', b.dataset.v === window.__tweaks.currency));
    document.body.style.background = window.__tweaks.theme === 'dark' ? '#141210' : '#F5F1E8';
  };
  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('on');
    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('on');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  document.getElementById('theme-seg').addEventListener('click', (e) => {
    if (e.target.dataset.v) {
      window.__tweaks.theme = e.target.dataset.v;
      window.__applyTweaks();
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: e.target.dataset.v } }, '*');
    }
  });
  document.getElementById('ccy-seg').addEventListener('click', (e) => {
    if (e.target.dataset.v) {
      window.__tweaks.currency = e.target.dataset.v;
      window.__applyTweaks();
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { currency: e.target.dataset.v } }, '*');
    }
  });
</script>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-5">
function __mount() {
  if (typeof ReactDOM === 'undefined' || !window.Dashboard) {
    return setTimeout(__mount, 30);
  }
  const { Dashboard } = window;
  function App() {
    const [, force] = React.useReducer((x) => x + 1, 0);
    React.useEffect(() => {
      window.__rerender = force;
      window.__applyTweaks && window.__applyTweaks();
    }, []);
    return <Dashboard theme={window.__tweaks.theme} currency={window.__tweaks.currency} />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
__mount();
</script>
